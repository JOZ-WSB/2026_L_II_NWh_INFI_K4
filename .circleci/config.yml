version: 2.1

jobs:
  build-and-test:
    machine:
      image: ubuntu-2004:current
    steps:
        - checkout
        
        - run:
            name: Install dependencies
            command: make deps
        - run:
            name: Run linter
            command: make lint
        - run:
            name: Run tests
            command: make test
        - run: make docker_build
workflows:
  basic:
    jobs:
      - build-and-test